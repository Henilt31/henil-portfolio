<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d12"/>
      <stop offset="100%" style="stop-color:#13131a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7efcaa"/>
      <stop offset="100%" style="stop-color:#4ef08a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect width="62" height="62" x="1" y="1" rx="13" fill="none" stroke="#7efcaa" stroke-width="1" opacity="0.3"/>
  <!-- H letter -->
  <text x="7" y="46" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="url(#accent)">H</text>
  <!-- T letter -->
  <text x="33" y="46" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="white" opacity="0.9">T</text>
  <!-- Accent dot -->
  <circle cx="57" cy="10" r="4" fill="#7efcaa" opacity="0.8"/>
</svg>
